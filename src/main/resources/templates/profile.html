<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('My Profile - HealthCare+')}">
</head>
<body>
    <th:block th:replace="~{layout :: navbar}"></th:block>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 overflow-hidden">
                    <div class="card-header bg-primary text-white p-4">
                        <div class="d-flex align-items-center">
                            <div class="bg-white bg-opacity-25 rounded-circle p-3 me-4">
                                <i class="bi bi-person-fill fs-1"></i>
                            </div>
                            <div>
                                <h2 class="fw-bold mb-0" th:text="${user.name}">John Doe</h2>
                                <span class="badge bg-white text-primary fw-bold" th:text="${user.role}">PATIENT</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <div th:if="${param.updated}" class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i> Profile updated successfully!
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <form th:action="@{/profile}" method="post">
                            <h5 class="fw-bold mb-4 border-bottom pb-2 text-secondary">Basic Information</h5>
                            <div class="row g-3 mb-5">
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-bold">Full Name</label>
                                    <input type="text" class="form-control bg-light border-0" th:value="${user.name}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-bold">Email Address</label>
                                    <input type="email" class="form-control bg-light border-0" th:value="${user.email}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-bold">Phone Number</label>
                                    <input type="text" class="form-control bg-light border-0" th:value="${user.phone}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-bold">Member Since</label>
                                    <input type="text" class="form-control bg-light border-0" th:value="${#temporals.format(user.createdAt, 'dd MMM yyyy')}" readonly>
                                </div>
                            </div>

                            <!-- Role Specific Fields -->
                            <div th:if="${user.role.name() == 'PATIENT'}">
                                <h5 class="fw-bold mb-4 border-bottom pb-2 text-secondary">Patient Details</h5>
                                <div class="row g-3 mb-5">
                                    <div class="col-md-4">
                                        <label class="form-label text-secondary small fw-bold">Age</label>
                                        <input type="text" class="form-control bg-light border-0" th:value="${user.age}" readonly>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label text-secondary small fw-bold">Gender</label>
                                        <input type="text" class="form-control bg-light border-0" th:value="${user.gender}" readonly>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label text-secondary small fw-bold">Address</label>
                                        <p class="p-3 bg-light rounded-3 mb-0" th:text="${user.address}"></p>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${user.role.name() == 'DOCTOR'}">
                                <h5 class="fw-bold mb-4 border-bottom pb-2 text-secondary">Professional Details</h5>
                                <div class="row g-3 mb-5">
                                    <div class="col-md-6">
                                        <label class="form-label text-secondary small fw-bold">Specialization</label>
                                        <input type="text" class="form-control bg-light border-0" th:value="${user.specialization}" readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-secondary small fw-bold">Years of Experience</label>
                                        <input type="text" class="form-control bg-light border-0" th:value="${user.experience}" readonly>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${user.role.name() == 'PHARMACIST'}">
                                <h5 class="fw-bold mb-4 border-bottom pb-2 text-secondary">Pharmacy Details</h5>
                                <div class="row g-3 mb-5">
                                    <div class="col-md-6">
                                        <label class="form-label text-secondary small fw-bold">Pharmacy Name</label>
                                        <input type="text" class="form-control bg-light border-0" th:value="${user.pharmacyName}" readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-secondary small fw-bold">License Number</label>
                                        <input type="text" class="form-control bg-light border-0" th:value="${user.licenseNumber}" readonly>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label text-secondary small fw-bold">Pharmacy Address</label>
                                        <p class="p-3 bg-light rounded-3 mb-0" th:text="${user.pharmacyAddress}"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-outline-secondary px-4 me-md-2" disabled>Edit Profile</button>
                                <a th:href="@{/}" class="btn btn-primary px-4">Back to Dashboard</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
