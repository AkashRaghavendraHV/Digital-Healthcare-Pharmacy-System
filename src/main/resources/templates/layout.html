<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Healthcare System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        // Apply theme immediately to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    <style>
        :root, [data-bs-theme="light"] {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }
        [data-bs-theme="dark"] {
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --border-color: #334155;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
            border-radius: 0.5rem;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            color: #fff;
        }
        .navbar {
            background-color: var(--card-bg) !important;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-link {
            color: var(--text-color) !important;
            font-weight: 500;
        }
        .nav-link:hover {
            color: var(--primary-color) !important;
        }
    </style>
</head>
<body>
    
    <!-- Navbar Component -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg mb-4 sticky-top">
        <div class="container">
            <!-- Dynamic Brand Link -->
            <a class="navbar-brand fw-bold mb-0 h1" 
               th:href="${#authorization.expression('hasRole(''PATIENT'')') ? '/patient/dashboard' : 
                         (#authorization.expression('hasRole(''DOCTOR'')') ? '/doctor/dashboard' : 
                         (#authorization.expression('hasRole(''PHARMACIST'')') ? '/pharmacist/dashboard' : 
                         (#authorization.expression('hasRole(''ADMIN'')') ? '/admin/dashboard' : '/')))}" 
               style="color: var(--primary-color);">HealthCare+</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <!-- Patient Nav -->
                    <th:block sec:authorize="hasRole('PATIENT')">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/patient/dashboard}"><i class="bi bi-house-door me-1"></i>Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/patient/appointments}"><i class="bi bi-calendar-event me-1"></i>Appointments</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/patient/prescriptions}"><i class="bi bi-file-medical me-1"></i>Prescriptions</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/patient/orders}"><i class="bi bi-box-seam me-1"></i>Orders</a>
                        </li>
                    </th:block>

                    <!-- Doctor Nav -->
                    <th:block sec:authorize="hasRole('DOCTOR')">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/doctor/dashboard}"><i class="bi bi-house-door me-1"></i>Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/doctor/appointments}"><i class="bi bi-calendar-check me-1"></i>My Schedule</a>
                        </li>
                    </th:block>

                    <!-- Pharmacist Nav -->
                    <th:block sec:authorize="hasRole('PHARMACIST')">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/pharmacist/dashboard}"><i class="bi bi-house-door me-1"></i>Order Queue</a>
                        </li>
                    </th:block>

                    <!-- Admin Nav -->
                    <th:block sec:authorize="hasRole('ADMIN')">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people me-1"></i>Users</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/admin/medicines}"><i class="bi bi-capsule me-1"></i>Medicines</a>
                        </li>
                    </th:block>
                </ul>
                <div class="d-flex align-items-center">
                    <button class="btn btn-link text-decoration-none me-2" id="theme-toggle" style="color: var(--text-color);">
                        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                    </button>
                    <a th:href="@{/profile}" class="btn btn-outline-secondary me-2"><i class="bi bi-person me-1"></i>Profile</a>
                    <form th:action="@{/logout}" method="post" class="d-inline m-0">
                        <button type="submit" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Scripts Component -->
    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const toggleBtn = document.getElementById('theme-toggle');
                const themeIcon = document.getElementById('theme-icon');
                
                const updateIcon = (theme) => {
                    if (themeIcon) {
                        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
                    }
                };
                
                updateIcon(document.documentElement.getAttribute('data-bs-theme'));
                
                if(toggleBtn) {
                    toggleBtn.addEventListener('click', () => {
                        let currentTheme = document.documentElement.getAttribute('data-bs-theme');
                        let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                        
                        document.documentElement.setAttribute('data-bs-theme', newTheme);
                        localStorage.setItem('theme', newTheme);
                        updateIcon(newTheme);
                    });
                }
            });
        </script>
    </div>

</body>
</html>
