<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Medicine Catalog - HealthCare+')}">
</head>
<body>
    <th:block th:replace="~{layout :: navbar}"></th:block>

    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Medicine Catalog</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addMedicineModal">
                <i class="bi bi-plus-lg me-2"></i>Add Medicine
            </button>
        </div>
        
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Manufacturer</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="med : ${medicines}">
                                <td class="fw-bold" th:text="${med.name}">Paracetamol</td>
                                <td th:text="${med.category}">Painkiller</td>
                                <td th:text="${med.manufacturer}">HealthCorp</td>
                                <td th:text="${'$' + med.price}">$5.00</td>
                                <td>
                                    <span class="badge" th:classappend="${med.stockQuantity > 20 ? 'bg-success' : 'bg-warning'}"
                                          th:text="${med.stockQuantity}">100</span>
                                </td>
                                <td>
                                    <form th:action="@{'/admin/medicines/delete/' + ${med.medicineId}}" method="post" class="d-inline">
                                        <button class="btn btn-link text-danger p-0"><i class="bi bi-trash"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Medicine Modal -->
    <div class="modal fade" id="addMedicineModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/medicines/add}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Add New Medicine</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" name="category" class="form-control">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Price ($)</label>
                                <input type="number" step="0.01" name="price" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" name="stockQuantity" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Manufacturer</label>
                            <input type="text" name="manufacturer" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Medicine</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
