<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Generate Prescription - HealthCare+')}">
</head>
<body>
    <th:block th:replace="~{layout :: navbar}"></th:block>

    <div class="container pb-5">
        <h2 class="fw-bold mb-4">Generate E-Prescription</h2>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 mb-4 bg-primary bg-opacity-10 text-dark">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3 border-bottom pb-2" style="border-color: rgba(0,0,0,0.1) !important;">Consultation Overview</h5>
                        <p class="mb-1"><strong>Patient:</strong> <span th:text="${appointment.patient.name}"></span></p>
                        <p class="mb-1"><strong>Age:</strong> <span th:text="${appointment.patient.age}"></span></p>
                        <p class="mb-0"><strong>Gender:</strong> <span th:text="${appointment.patient.gender}"></span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form th:action="@{'/doctor/appointments/' + ${appointment.appointmentId} + '/prescribe'}" th:object="${prescription}" method="post">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Primary Diagnosis</label>
                                <input type="text" th:field="*{diagnosis}" class="form-control form-control-lg" placeholder="e.g., Viral Fever, Hypertension" required />
                            </div>
                            
                            <div class="alert alert-info border-0 mt-4 shadow-sm mb-4"><i class="bi bi-broadcast me-2"></i><strong>System Note:</strong> Saving this digital prescription successfully triggers the <strong>Observer Pattern</strong>, instantly pushing notifications to the Patient Dashboard and the Pharmacy Dispatch queues without tight coupling!</div>
                            
                            <button type="submit" class="btn btn-primary mt-2 px-5 py-3 fw-bold rounded-3 shadow-sm"><i class="bi bi-file-earmark-check me-2"></i>Complete Consultation & Finalize</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
